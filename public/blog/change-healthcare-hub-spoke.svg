<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <!-- Background: warm off-white, distinct from ice (#F0F6FA) -->
  <rect width="800" height="500" fill="#FFFBEB"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#0F172A">Single Point of Failure: All Claims Through One Vendor</text>
  <text x="400" y="56" text-anchor="middle" font-size="12" fill="#44403C" opacity="0.75">15 billion transactions/year · $1.5 trillion in health claims · one network</text>

  <!-- Lines from providers to center: amber dashed -->
  <g stroke="#D97706" stroke-width="1.8" stroke-dasharray="6,4" opacity="0.6">
    <line x1="165" y1="115" x2="340" y2="245"/>
    <line x1="155" y1="205" x2="335" y2="250"/>
    <line x1="160" y1="295" x2="335" y2="258"/>
    <line x1="165" y1="385" x2="340" y2="268"/>
    <line x1="175" y1="460" x2="345" y2="278"/>
  </g>

  <!-- Lines from center to payers: amber dashed -->
  <g stroke="#D97706" stroke-width="1.8" stroke-dasharray="6,4" opacity="0.6">
    <line x1="460" y1="238" x2="620" y2="155"/>
    <line x1="462" y1="252" x2="628" y2="258"/>
    <line x1="460" y1="265" x2="620" y2="358"/>
  </g>

  <!-- ===== PROVIDER NODES (left): dark amber border ===== -->

  <rect x="20" y="90" width="140" height="50" rx="8" fill="white" stroke="#92400E" stroke-width="1.5"/>
  <text x="90" y="111" text-anchor="middle" font-size="11" font-weight="600" fill="#0F172A">Solo Practice</text>
  <text x="90" y="128" text-anchor="middle" font-size="10" fill="#44403C" opacity="0.65">1-3 physicians</text>

  <rect x="15" y="180" width="140" height="50" rx="8" fill="white" stroke="#92400E" stroke-width="1.5"/>
  <text x="85" y="201" text-anchor="middle" font-size="11" font-weight="600" fill="#0F172A">Group Practice</text>
  <text x="85" y="218" text-anchor="middle" font-size="10" fill="#44403C" opacity="0.65">4-10 physicians</text>

  <rect x="18" y="270" width="140" height="50" rx="8" fill="white" stroke="#92400E" stroke-width="1.5"/>
  <text x="88" y="291" text-anchor="middle" font-size="11" font-weight="600" fill="#0F172A">Hospital System</text>
  <text x="88" y="308" text-anchor="middle" font-size="10" fill="#44403C" opacity="0.65">Regional / national</text>

  <rect x="20" y="360" width="140" height="50" rx="8" fill="white" stroke="#92400E" stroke-width="1.5"/>
  <text x="90" y="381" text-anchor="middle" font-size="11" font-weight="600" fill="#0F172A">Rural Clinic</text>
  <text x="90" y="398" text-anchor="middle" font-size="10" fill="#44403C" opacity="0.65">Critical access</text>

  <rect x="22" y="437" width="140" height="46" rx="8" fill="white" stroke="#92400E" stroke-width="1.5"/>
  <text x="92" y="456" text-anchor="middle" font-size="11" font-weight="600" fill="#0F172A">Pharmacy</text>
  <text x="92" y="473" text-anchor="middle" font-size="10" fill="#44403C" opacity="0.65">Rx benefits / e-prescribe</text>

  <!-- ===== CENTER NODE: red ===== -->
  <circle cx="400" cy="255" r="85" fill="#DC2626" opacity="0.1"/>
  <circle cx="400" cy="255" r="70" fill="#DC2626"/>
  <circle cx="400" cy="255" r="66" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>

  <!-- Warning triangle -->
  <polygon points="400,210 427,255 373,255" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="400" y="250" text-anchor="middle" font-size="13" fill="white" font-weight="700">!</text>

  <text x="400" y="273" text-anchor="middle" font-size="11" font-weight="700" fill="white">Change</text>
  <text x="400" y="288" text-anchor="middle" font-size="11" font-weight="700" fill="white">Healthcare</text>
  <text x="400" y="308" text-anchor="middle" font-size="10" fill="white" opacity="0.85">BREACHED Feb 21, 2024</text>

  <!-- ===== PAYER NODES (right): amber border ===== -->

  <rect x="638" y="128" width="148" height="54" rx="8" fill="white" stroke="#D97706" stroke-width="1.5"/>
  <text x="712" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#0F172A">Medicare / Medicaid</text>
  <text x="712" y="167" text-anchor="middle" font-size="10" fill="#44403C" opacity="0.65">Government payers</text>

  <rect x="640" y="231" width="148" height="54" rx="8" fill="white" stroke="#D97706" stroke-width="1.5"/>
  <text x="714" y="253" text-anchor="middle" font-size="11" font-weight="600" fill="#0F172A">Commercial Insurers</text>
  <text x="714" y="270" text-anchor="middle" font-size="10" fill="#44403C" opacity="0.65">Aetna, BCBS, Cigna, UHC</text>

  <rect x="638" y="334" width="148" height="54" rx="8" fill="white" stroke="#D97706" stroke-width="1.5"/>
  <text x="712" y="356" text-anchor="middle" font-size="11" font-weight="600" fill="#0F172A">Self-Insured Plans</text>
  <text x="712" y="373" text-anchor="middle" font-size="10" fill="#44403C" opacity="0.65">Employer health plans</text>

  <!-- Section labels -->
  <text x="89" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#92400E">PROVIDERS</text>
  <text x="711" y="116" text-anchor="middle" font-size="11" font-weight="600" fill="#D97706">PAYERS</text>

  <!-- Failure callout: dark slate matching hero background -->
  <rect x="302" y="336" width="196" height="44" rx="6" fill="#0F172A"/>
  <text x="400" y="354" text-anchor="middle" font-size="11" fill="white" font-weight="600">Outage: Feb 21 - Nov 2024</text>
  <text x="400" y="370" text-anchor="middle" font-size="10" fill="#FEF3C7" opacity="0.75">9 months to full restoration</text>

  <line x1="400" y1="336" x2="400" y2="326" stroke="#0F172A" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0F172A"/>
    </marker>
  </defs>

  <text x="400" y="492" text-anchor="middle" font-size="10" fill="#44403C" opacity="0.45">Source: U.S. House Energy and Commerce Committee, AHA, OFR/Treasury (2024)</text>
</svg>
