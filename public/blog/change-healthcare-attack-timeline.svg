<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <!-- Background: dark slate matching hero -->
  <rect width="800" height="360" fill="#0F172A"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="white">Attack and Recovery: Nine Months in Six Events</text>

  <!-- Timeline axis line -->
  <line x1="55" y1="188" x2="748" y2="188" stroke="#D97706" stroke-width="2" opacity="0.5"/>
  <!-- Arrowhead at end -->
  <polygon points="748,183 760,188 748,193" fill="#D97706" opacity="0.5"/>

  <!-- ===== EVENTS ABOVE THE LINE ===== -->

  <!-- Event 1 (above): Feb 12 -- Initial Access, x=95 -->
  <line x1="95" y1="163" x2="95" y2="188" stroke="#D97706" stroke-width="1.5"/>
  <circle cx="95" cy="188" r="7" fill="#D97706"/>
  <rect x="28" y="96" width="134" height="64" rx="6" fill="#D97706" opacity="0.12"/>
  <rect x="28" y="96" width="134" height="64" rx="6" fill="none" stroke="#D97706" stroke-width="1.2"/>
  <text x="95" y="114" text-anchor="middle" font-size="10" font-weight="700" fill="#FEF3C7">Feb 12, 2024</text>
  <text x="95" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="white">Initial Access</text>
  <text x="95" y="146" text-anchor="middle" font-size="9" fill="#FEF3C7" opacity="0.7">Citrix portal, stolen creds</text>
  <text x="95" y="159" text-anchor="middle" font-size="9" fill="#FEF3C7" opacity="0.7">No MFA in place</text>

  <!-- Event 3 (above): Feb 21 -- Ransomware, x=340 -->
  <line x1="340" y1="163" x2="340" y2="188" stroke="#DC2626" stroke-width="1.5"/>
  <circle cx="340" cy="188" r="8" fill="#DC2626"/>
  <rect x="270" y="96" width="140" height="64" rx="6" fill="#DC2626" opacity="0.15"/>
  <rect x="270" y="96" width="140" height="64" rx="6" fill="none" stroke="#DC2626" stroke-width="1.5"/>
  <text x="340" y="114" text-anchor="middle" font-size="10" font-weight="700" fill="#FEF3C7">Feb 21, 2024</text>
  <text x="340" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="white">Ransomware Deployed</text>
  <text x="340" y="146" text-anchor="middle" font-size="9" fill="#FEF3C7" opacity="0.7">Systems taken offline</text>
  <text x="340" y="159" text-anchor="middle" font-size="9" fill="#FEF3C7" opacity="0.7">Nationwide outage begins</text>

  <!-- Event 5 (above): Mar 7 -- Partial Restore, x=580 -->
  <line x1="580" y1="163" x2="580" y2="188" stroke="#D97706" stroke-width="1.5"/>
  <circle cx="580" cy="188" r="7" fill="#D97706" opacity="0.7"/>
  <rect x="514" y="96" width="132" height="64" rx="6" fill="#D97706" opacity="0.1"/>
  <rect x="514" y="96" width="132" height="64" rx="6" fill="none" stroke="#D97706" stroke-width="1" opacity="0.7"/>
  <text x="580" y="114" text-anchor="middle" font-size="10" font-weight="700" fill="#FEF3C7">Mar 7, 2024</text>
  <text x="580" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="white">Partial Restoration</text>
  <text x="580" y="146" text-anchor="middle" font-size="9" fill="#FEF3C7" opacity="0.7">Pharmacy + e-prescribing</text>
  <text x="580" y="159" text-anchor="middle" font-size="9" fill="#FEF3C7" opacity="0.7">Claims still offline</text>

  <!-- ===== EVENTS BELOW THE LINE ===== -->

  <!-- Event 2 (below): Feb 12-20 -- 9 Days Dwell, x=215 -->
  <line x1="215" y1="188" x2="215" y2="213" stroke="#D97706" stroke-width="1.5"/>
  <circle cx="215" cy="188" r="7" fill="#D97706" opacity="0.85"/>
  <rect x="148" y="216" width="134" height="64" rx="6" fill="#D97706" opacity="0.1"/>
  <rect x="148" y="216" width="134" height="64" rx="6" fill="none" stroke="#D97706" stroke-width="1.2"/>
  <text x="215" y="234" text-anchor="middle" font-size="10" font-weight="700" fill="#FEF3C7">Feb 12-20, 2024</text>
  <text x="215" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="white">9 Days Undetected</text>
  <text x="215" y="266" text-anchor="middle" font-size="9" fill="#FEF3C7" opacity="0.7">Lateral movement</text>
  <text x="215" y="279" text-anchor="middle" font-size="9" fill="#FEF3C7" opacity="0.7">No alerts triggered</text>

  <!-- Event 4 (below): ~Mar 1 -- Ransom Paid, x=460 -->
  <line x1="460" y1="188" x2="460" y2="213" stroke="#DC2626" stroke-width="1.5"/>
  <circle cx="460" cy="188" r="8" fill="#DC2626"/>
  <rect x="390" y="216" width="140" height="64" rx="6" fill="#DC2626" opacity="0.12"/>
  <rect x="390" y="216" width="140" height="64" rx="6" fill="none" stroke="#DC2626" stroke-width="1.5"/>
  <text x="460" y="234" text-anchor="middle" font-size="10" font-weight="700" fill="#FEF3C7">~Mar 1, 2024</text>
  <text x="460" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="white">$22M Ransom Paid</text>
  <text x="460" y="266" text-anchor="middle" font-size="9" fill="#FEF3C7" opacity="0.7">350 BTC to ALPHV/BlackCat</text>
  <text x="460" y="279" text-anchor="middle" font-size="9" fill="#FEF3C7" opacity="0.7">Exit scam followed</text>

  <!-- Event 6 (below): Nov 2024 -- Full Restoration, x=700 -->
  <line x1="700" y1="188" x2="700" y2="213" stroke="#6B7280" stroke-width="1.5"/>
  <circle cx="700" cy="188" r="7" fill="#6B7280"/>
  <rect x="635" y="216" width="130" height="64" rx="6" fill="#6B7280" opacity="0.1"/>
  <rect x="635" y="216" width="130" height="64" rx="6" fill="none" stroke="#6B7280" stroke-width="1" opacity="0.6"/>
  <text x="700" y="234" text-anchor="middle" font-size="10" font-weight="700" fill="#FEF3C7">November 2024</text>
  <text x="700" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="white">Full Restoration</text>
  <text x="700" y="266" text-anchor="middle" font-size="9" fill="#FEF3C7" opacity="0.7">9 months after attack</text>
  <text x="700" y="279" text-anchor="middle" font-size="9" fill="#FEF3C7" opacity="0.7">192.7M records exposed</text>

  <!-- Source -->
  <text x="400" y="348" text-anchor="middle" font-size="10" fill="#FEF3C7" opacity="0.3">Source: TechCrunch, The Register, UnitedHealth Group disclosures (2024-2025)</text>
</svg>
