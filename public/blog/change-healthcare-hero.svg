<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <!-- Background: dark slate, distinct from navy -->
  <rect width="800" height="420" fill="#0F172A"/>

  <!-- Subtle grid lines: amber -->
  <g stroke="#D97706" stroke-width="0.5" opacity="0.15">
    <line x1="0" y1="70" x2="800" y2="70"/>
    <line x1="0" y1="140" x2="800" y2="140"/>
    <line x1="0" y1="210" x2="800" y2="210"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="420"/>
    <line x1="200" y1="0" x2="200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="420"/>
    <line x1="500" y1="0" x2="500" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="700" y1="0" x2="700" y2="420"/>
  </g>

  <!-- Network lines radiating from center breach point: amber -->
  <g stroke="#D97706" stroke-width="1.5" opacity="0.4">
    <line x1="400" y1="210" x2="120" y2="80"/>
    <line x1="400" y1="210" x2="80" y2="210"/>
    <line x1="400" y1="210" x2="140" y2="340"/>
    <line x1="400" y1="210" x2="680" y2="80"/>
    <line x1="400" y1="210" x2="720" y2="210"/>
    <line x1="400" y1="210" x2="660" y2="340"/>
    <line x1="400" y1="210" x2="280" y2="50"/>
    <line x1="400" y1="210" x2="520" y2="50"/>
    <line x1="400" y1="210" x2="270" y2="370"/>
    <line x1="400" y1="210" x2="530" y2="370"/>
  </g>

  <!-- Outer nodes: amber -->
  <circle cx="120" cy="80" r="12" fill="#D97706" opacity="0.7"/>
  <circle cx="80" cy="210" r="12" fill="#D97706" opacity="0.7"/>
  <circle cx="140" cy="340" r="12" fill="#D97706" opacity="0.7"/>
  <circle cx="680" cy="80" r="12" fill="#D97706" opacity="0.7"/>
  <circle cx="720" cy="210" r="12" fill="#D97706" opacity="0.7"/>
  <circle cx="660" cy="340" r="12" fill="#D97706" opacity="0.7"/>
  <circle cx="280" cy="50" r="10" fill="#D97706" opacity="0.5"/>
  <circle cx="520" cy="50" r="10" fill="#D97706" opacity="0.5"/>
  <circle cx="270" cy="370" r="10" fill="#D97706" opacity="0.5"/>
  <circle cx="530" cy="370" r="10" fill="#D97706" opacity="0.5"/>

  <!-- Central breach node glow: red -->
  <circle cx="400" cy="210" r="75" fill="#DC2626" opacity="0.12"/>
  <circle cx="400" cy="210" r="55" fill="#DC2626" opacity="0.2"/>

  <!-- Central node: red -->
  <circle cx="400" cy="210" r="40" fill="#DC2626"/>

  <!-- Breach / broken lock icon -->
  <rect x="384" y="208" width="32" height="22" rx="3" fill="white" opacity="0.9"/>
  <path d="M389 208 L389 200 Q389 192 400 192 Q408 192 411 197" stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  <circle cx="400" cy="217" r="4" fill="#DC2626"/>
  <rect x="398" y="217" width="4" height="7" fill="#DC2626"/>

  <!-- Crack lines across center node -->
  <line x1="393" y1="198" x2="407" y2="222" stroke="#0F172A" stroke-width="1.5" opacity="0.5"/>

  <!-- Text -->
  <text x="400" y="290" text-anchor="middle" font-size="22" font-weight="700" fill="white" letter-spacing="-0.3">Change Healthcare</text>
  <text x="400" y="316" text-anchor="middle" font-size="13" fill="#FEF3C7" opacity="0.75">February 21, 2024 -- 192.7 million records breached</text>
  <text x="400" y="344" text-anchor="middle" font-size="13" fill="#D97706" font-weight="600">40% of U.S. medical claims through one node</text>

  <!-- Bottom label -->
  <text x="400" y="398" text-anchor="middle" font-size="11" fill="#FEF3C7" opacity="0.4">RizeX Capital -- Sovereign RCM</text>
</svg>
